<div class="dock-icon-wrap"
     [class.active]="isActive()"
     [class.has-window]="hasWindow()"
     (mouseenter)="hovered.set(true)"
     (mouseleave)="hovered.set(false)"
     (click)="open.emit()">

  @if (hasWindow()) {
    <div class="dock-indicator"></div>
  }

  @if (hovered()) {
    <div class="dock-tooltip ub-anim-slide-down">{{ label() }}</div>
  }

  <div class="dock-icon-bg" [class.hovered]="hovered()" [innerHTML]="svgIcon()">
  </div>
</div>
