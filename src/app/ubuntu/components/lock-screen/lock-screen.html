<div class="lock-screen" [class.fading-out]="fadingOut()" (click)="unlock()" (keydown.enter)="unlock()">
  <!-- Wallpaper -->
  <div class="lock-bg"></div>
  <div class="lock-overlay"></div>

  <!-- Content -->
  <div class="lock-content">
    <!-- Clock -->
    <div class="lock-time">{{ timeStr() }}</div>
    <div class="lock-date">{{ dateStr() }}</div>

    <!-- Ubuntu COF -->
    <div class="lock-cof">
      <svg viewBox="0 0 100 100" width="64" height="64">
        <circle cx="50" cy="50" r="46" fill="#e95420"/>
        <g fill="#fff">
          <circle cx="50" cy="16" r="9"/>
          <circle cx="17.7" cy="66" r="9"/>
          <circle cx="82.3" cy="66" r="9"/>
        </g>
        <g fill="none" stroke="#fff" stroke-width="4.5" opacity=".5">
          <line x1="50" y1="25" x2="25" y2="58"/>
          <line x1="50" y1="25" x2="75" y2="58"/>
          <line x1="25" y1="58" x2="75" y2="58"/>
        </g>
      </svg>
    </div>

    <div class="lock-user">Thamil Selvan</div>
    <div class="lock-hint">Click or press any key to unlock</div>
  </div>
</div>
